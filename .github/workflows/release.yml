name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Compute sha256
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "value=$SHA" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Update homebrew-tap formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          SHA="${{ steps.sha.outputs.value }}"
          URL="${{ steps.sha.outputs.url }}"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/masaki39/homebrew-tap.git"
          cd homebrew-tap

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/ghq-fzf.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/ghq-fzf.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ghq-fzf.rb
          git commit -m "Update ghq-fzf to ${VERSION}"
          git push
